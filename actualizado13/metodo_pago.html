<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTranzit - Métodos de Pago</title>
    
    <style>
        :root {
            --bg-body: #ffffff;
            --dark-blue: #14550c; 
            --gray-text: #333;
            --accent-green: #28a745;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
            color: var(--gray-text);
        }

        /* BARRA SUPERIOR */
        .barra-superior {
            background-color: var(--dark-blue);
            color: white;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 1.4rem; font-weight: bold; }

        .menu-superior button {
            background: transparent;
            border: none;
            color: #ccc;
            padding: 10px 15px;
            cursor: pointer;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        .menu-superior button:hover, .menu-superior button.activo {
            color: white;
            border-bottom: 2px solid white;
        }

        /* CONTENEDOR PRINCIPAL */
        .main-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }

        .section-header h2 {
            font-size: 1.6rem;
            color: var(--dark-blue);
            margin-bottom: 25px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }

        /* TARJETA DE CÁLCULO */
        .card {
            background: white;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 400px;
            margin: 0 auto;
        }

        .card h2 {
            margin-top: 0;
            font-size: 1.2rem;
            color: var(--dark-blue);
            text-align: center;
            margin-bottom: 20px;
        }

        .input-group { margin-bottom: 15px; }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            font-weight: bold;
            color: #555;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
            box-sizing: border-box;
        }

        .btn-calcular {
            width: 100%;
            background-color: var(--dark-blue);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        /* CUADRO DE RESULTADOS */
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #f9f9f9;
            border-left: 4px solid var(--dark-blue);
            border-radius: 4px;
            display: none;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.95rem;
        }

        .total-grupal {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #ddd;
            font-weight: bold;
        }

        /* RESALTE POR PERSONA */
        .pago-individual {
            margin-top: 15px;
            background-color: #e7f3ff;
            padding: 12px;
            border-radius: 4px;
            text-align: center;
        }

        .pago-individual span {
            display: block;
            font-size: 1.2rem;
            color: var(--dark-blue);
            font-weight: bold;
        }

        
    </style>
</head>

<body>

    <header class="barra-superior">
        <div class="logo">UTranzit</div>
        <nav class="menu-superior">
            <button onclick="window.location.href='pantalla1.html'">RUTA A LA UT</button>
            <button class="activo">METODOS DE PAGO</button>
            <button onclick="window.location.href='avisos.php'">AVISOS</button>
            <button onclick="window.location.href='instalaciones.html'">INSTALACIONES</button>
        </nav>
        <div class="perfil"></div>
    </header>

    <div class="main-container">
        <header class="section-header">
            <h2>Gestión de Pagos</h2>
        </header>

        <div class="card">
            <h2>Calculadora de Viaje Compartido</h2>
            
            <div class="input-group">
                <label for="km">Distancia (Kilómetros):</label>
                <input type="number" id="km" placeholder="Ej: 8.5" step="0.1" min="0">
            </div>

            <div class="input-group">
                <label for="pasajeros">¿Cuántas personas viajan?</label>
                <select id="pasajeros">
                    <option value="1">Solo yo (1)</option>
                    <option value="2">2 personas</option>
                    <option value="3">3 personas</option>
                    <option value="4">4 personas</option>
                </select>
            </div>

            <button class="btn-calcular" onclick="calcularPrecio()">Calcular División</button>

            <div id="resultado" class="result-box">
                <div class="result-row">
                    <span>Tarifa Base:</span>
                    <span>$10.00</span>
                </div>
                <div class="result-row">
                    <span>Costo por Trayecto:</span>
                    <span id="desgloseKm">$0.00</span>
                </div>
                <div class="result-row total-grupal">
                    <span>Total General:</span>
                    <span id="precioFinal">$0.00</span>
                </div>

                <div class="pago-individual">
                    <small>Cada persona paga:</small>
                    <span id="cuotaIndividual">$0.00</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function calcularPrecio() {
            const TARIFA_BASE = 10.00;
            const PRECIO_POR_KM = 10.00;

            const km = parseFloat(document.getElementById('km').value);
            const numPersonas = parseInt(document.getElementById('pasajeros').value);

            if (isNaN(km) || km <= 0) {
                alert("Por favor, ingresa una distancia válida.");
                return;
            }

            // Cálculos
            const costoTrayecto = km * PRECIO_POR_KM;
            const totalGeneral = TARIFA_BASE + costoTrayecto;
            const pagoPorPersona = totalGeneral / numPersonas;

            // Actualizar Interfaz
            document.getElementById('desgloseKm').innerText = `$${costoTrayecto.toFixed(2)}`;
            document.getElementById('precioFinal').innerText = `$${totalGeneral.toFixed(2)}`;
            document.getElementById('cuotaIndividual').innerText = `$${pagoPorPersona.toFixed(2)}`;
            
            document.getElementById('resultado').style.display = 'block';
        }
    </script>
</body>
</html>
